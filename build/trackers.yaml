  # ── Added from Forbes HAR QA (2026-05) ─────────────────────────────
  # Ketch CMP first: its absence produced a false "No CMP detected" high
  # finding. cc:c flips cmpStatus and clears that finding.

  - pattern: "ketchcdn.com"
    name: "Ketch (Consent Management)"
    category: "Consent Management"
    cc: c
    risk: ok
    regs:
      - US State Privacy
      - GDPR
    description: >-
      Ketch consent and data-permissioning platform (global.ketchcdn.com serves the Ketch tag and
      configuration). Load order is critical: if Ketch loads after tracking scripts, consent cannot
      be gated and visitors are tracked before any consent decision is possible. Ketch also exposes a
      programmatic consent API and GPC handling that must be wired to each ad platform's opt-out path.
    action: >-
      Verify Ketch loads before any tracking tag, that consent types require affirmative action rather
      than auto-grant, that GPC detection is enabled, and that opt-out and GPC propagate to Meta (LDU),
      Google (RDP), and other ad destinations at the event level.

  - pattern: "ketchjs.com"
    name: "Ketch (CDN)"
    category: "Consent Management"
    cc: c
    risk: ok
    regs:
      - US State Privacy
      - GDPR
    description: >-
      Ketch consent platform CDN (cdn.ketchjs.com).
    action: >-
      See Ketch findings.

