# HARstack tracker database
# This file is the authoritative source for the TR object in the tool.
# build/build.py reads it and generates the JavaScript const TR = { ... } block.
#
# Fields:
#   pattern     URL substring matched against request URLs (key into TR object)
#   name        human-readable vendor name
#   category    display category (Advertising, Analytics, Session Replay, ...)
#   cc          category code: a=advertising, an=analytics, s=session replay,
#               d=CDP, c=CMP, t=tag management, e=email marketing, p=payment
#   risk        high | medium | low | ok
#   regs        applicable regulations (list)
#   description vendor description; may contain <<SR_FRAMING>> placeholder
#   action      audit action items; may contain <<SR_ACTION>> placeholder
#
# <<SR_FRAMING>> and <<SR_ACTION>> expand to the shared text blocks defined
# in the 'shared' section below. build.py substitutes them at build time.

shared:
  sr_framing: >-
    Session replay tools record user interactions (clicks, scrolls, form interactions, page
    navigation) in real time. Courts have addressed real-time session recording under both ECPA
    (Wiretap Act) and CIPA wiretapping/eavesdropping theories. The litigation exposure attaches at the
    moment of capture, not downstream: deletion frameworks and machine unlearning policies do not
    address the interception itself. Standing has been a defense win in some cases (notably Popa v.
    Microsoft at the Ninth Circuit in August 2025, affirmed dismissal for lack of concrete injury),
    but motions to dismiss continue to be denied in others. Where the session replay vendor processes
    data for its own commercial purposes (rather than as a service provider under DPA), the
    transmission also constitutes "sharing" under CPRA.

  sr_action: >-
    (1) Inventory every page where this session replay tool is active; (2) remove from pages where
    financial data, health information, credentials, or other sensitive inputs are entered; (3)
    disclose the tool by name in your privacy policy; (4) verify the CMP gates session replay firing
    on opt-out and GPC; (5) confirm the contractual relationship (processor with executed DPA vs.
    independent controller) and the data use scope.

trackers:
  - pattern: "facebook.com/tr"
    name: "Meta Pixel"
    category: "Advertising"
    cc: a
    risk: high
    regs:
      - ECPA
      - US State Privacy
    description: >-
      Transmits browsing behavior and page URLs to Meta in real time. If your privacy policy states
      you do not share data with advertising partners, this is a direct policy conflict: the pattern
      the August 2025 ECPA ruling found sufficient to state a federal wiretapping claim.
    action: >-
      Verify policy discloses Meta data sharing. Confirm CMP suppresses this tag on opt-out and GPC
      signal. Confirm CCPA sharing designation applies.

  - pattern: "connect.facebook.net"
    name: "Meta Pixel SDK"
    category: "Advertising"
    cc: a
    risk: high
    regs:
      - ECPA
      - US State Privacy
    description: >-
      Meta Pixel JavaScript SDK from Facebook CDN. Enables real-time behavioral data to Meta
      advertising.
    action: >-
      Same as Meta Pixel. Review policy and CMP configuration.

  - pattern: "ads.tiktok.com"
    name: "TikTok Pixel"
    category: "Advertising"
    cc: a
    risk: high
    regs:
      - ECPA
      - US State Privacy
    description: >-
      Collects user behavior for TikTok ad targeting. CCPA sale/sharing restrictions apply. TikTok
      cross-border data transfer practices add additional regulatory surface.
    action: >-
      Review cross-border transfer implications. CMP suppression on opt-out. Specific privacy policy
      disclosure required.

  - pattern: "analytics.tiktok.com"
    name: "TikTok Analytics"
    category: "Advertising"
    cc: a
    risk: high
    regs:
      - US State Privacy
    description: >-
      TikTok analytics collection endpoint.
    action: >-
      Review policy disclosure and CMP suppression.

  - pattern: "alb.reddit.com"
    name: "Reddit Pixel"
    category: "Advertising"
    cc: a
    risk: medium
    regs:
      - ECPA
      - US State Privacy
    description: >-
      Reddit conversion pixel. Same structural ECPA and CCPA exposure as larger ad platforms with
      growing litigation presence.
    action: >-
      Disclose in privacy policy. Verify CMP suppression on opt-out.

  - pattern: "analytics.google.com"
    name: "GA4"
    category: "Analytics"
    cc: an
    risk: medium
    regs:
      - ECPA
      - US State Privacy
    description: >-
      Google Analytics 4. Transmits events, page URLs, and user identifiers to Google. Depending on
      contract terms and data use configuration, may constitute "sharing" under CPRA.
    action: >-
      Review GA4 data processing agreement. Determine whether configuration constitutes sharing.
      Verify CMP integration.

  - pattern: "google-analytics.com/g/"
    name: "GA4 (collect)"
    category: "Analytics"
    cc: an
    risk: medium
    regs:
      - ECPA
      - US State Privacy
    description: >-
      Google Analytics 4 collection endpoint. GA4 currently uses two collection domains:
      google-analytics.com/g/collect and analytics.google.com/g/collect. Both are active. The
      /g/collect path is the GA4 browser-side collection endpoint; the /mp/collect path on the same
      domain is the GA4 Measurement Protocol endpoint for server-side hits (requires an API secret,
      rarely seen in a browser HAR). GA4 measurement IDs use the G- prefix. Hits carrying tid=UA- on
      the legacy /collect path indicate Universal Analytics, which Google deprecated on July 1, 2023;
      UA hits in a current-year capture warrant a separate remediation note because that data is no
      longer being processed.
    action: >-
      Review GA4 configuration. Verify Google Signals state and whether the configuration constitutes
      "sharing" under CPRA. Verify CMP gating.

  - pattern: "tid=UA-"
    name: "Google Analytics (UA)"
    category: "Analytics"
    cc: an
    risk: medium
    regs:
      - ECPA
      - US State Privacy
    description: >-
      Universal Analytics tracking ID (UA- prefix) detected in a collect request. Google sunset UA on
      July 1, 2024 and processing stopped July 2024. Any active UA-tid traffic now means stale tags
      still firing or a legacy integration that was never migrated.
    action: >-
      Identify and remove the source of UA-tid traffic. Confirm migration to GA4 is complete. Audit
      GTM/tag-manager configurations for orphaned UA tags.

  - pattern: "googletagmanager.com"
    name: "Google Tag Manager"
    category: "Tag Management"
    cc: t
    risk: low
    regs:
      - US State Privacy
    description: >-
      GTM container. Risk is in what tags are deployed inside it, not GTM itself. Server-side GTM
      configurations can affect consent bypass risk.
    action: >-
      Audit what tags fire inside GTM. Verify no tags are configured to fire outside CMP consent
      logic.

  - pattern: "gtag/js?id=AW-"
    name: "Google Ads (gtag)"
    category: "Advertising"
    cc: a
    risk: high
    regs:
      - ECPA
      - US State Privacy
    description: >-
      Google Ads gtag.js loaded with an AW- conversion ID prefix. This fires Google Ads conversion
      tracking, remarketing, and Enhanced Conversions if configured. Constitutes "sharing" under CPRA.
      Must be suppressed on GPC and opt-out.
    action: >-
      Verify CMP suppresses this tag on GPC and CCPA opt-out. Confirm Enhanced Conversions hashed PII
      handling. Disclose Google Ads sharing in your privacy policy.

  - pattern: "gtag/js?id=G-"
    name: "GA4 (gtag)"
    category: "Analytics"
    cc: an
    risk: medium
    regs:
      - ECPA
      - US State Privacy
    description: >-
      Google Analytics 4 loaded via gtag.js (G- measurement ID prefix). Loads the GA4 measurement
      library and initiates the /g/collect data flow.
    action: >-
      Verify CMP gating. Review Google Signals configuration and whether the deployment constitutes
      sharing.

  - pattern: "gtag/js?id=UA-"
    name: "Google Analytics UA (gtag)"
    category: "Analytics"
    cc: an
    risk: medium
    regs:
      - ECPA
      - US State Privacy
    description: >-
      Legacy Universal Analytics loaded via gtag.js (UA- tracking ID prefix). Google stopped
      processing UA traffic in July 2024. Any UA-tid gtag load is a stale tag firing.
    action: >-
      Remove the legacy UA tag from your tag manager configuration. Confirm GA4 has fully replaced it.

  - pattern: "googlesyndication.com"
    name: "Google AdSense / Display Ads"
    category: "Advertising"
    cc: a
    risk: high
    regs:
      - ECPA
      - US State Privacy
    description: >-
      Google AdSense and Display Network ad serving infrastructure (googlesyndication.com).
      Subdomains include pagead2 (ad script loading) and ade (Google AdExchange/Display Network
      ad delivery). Fires when the site runs Google Display ads or AdSense placements. Transmits
      visitor browsing context and targeting signals to Google for programmatic ad matching.
      Constitutes sale or sharing of personal information under CPRA.
    action: >-
      Verify CMP suppresses this endpoint on GPC and opt-out. Confirm Google Ads tags in GTM
      are consent-gated. Disclose Google Display/AdSense in your privacy policy under
      third-party advertising.

  - pattern: "google.com/pagead/form-data"
    name: "Google Ads Enhanced Conversions (Form Data)"
    category: "Advertising"
    cc: a
    risk: high
    regs:
      - ECPA
      - US State Privacy
    description: >-
      Google Ads Enhanced Conversions endpoint. Receives hashed PII (em=<sha256-email>,
      pn=<sha256-phone>) extracted from form fields at submission. The hashing happens client-side via
      the Google tag and is matched against Google's logged-in user database to attribute conversions
      to ad clicks. Constitutes "sharing," "sale," or "targeted advertising" under most US state
      privacy laws. The FTC's BetterHelp consent order (FTC File No. 2023-169, In the Matter of
      BetterHelp, Inc., Docket C-4796, final order July 14, 2023) established that hashing fails to
      protect privacy when the receiving party can un-hash the data; Google already possesses the
      underlying email and phone values for logged-in users and can match the hashed values to
      identified accounts. Under most US state privacy laws, transmission of hashed identifying
      information to a third-party advertising platform constitutes "sharing," "sale," or "targeted
      advertising" depending on the jurisdiction's terminology.
    action: >-
      (1) Audit which form fields are wired to Enhanced Conversions and on which pages; (2) verify
      suppression on GPC and CCPA opt-out; (3) disclose Enhanced Conversions specifically in your
      privacy policy, including the hashed-PII transmission to Google; (4) confirm DPA terms cover the
      conversion ID and the hashed identifiers transmitted.

  - pattern: "google.com/ccm/form-data"
    name: "Google Ads Conversion Linker (Form Data)"
    category: "Advertising"
    cc: a
    risk: high
    regs:
      - ECPA
      - US State Privacy
    description: >-
      Google Ads Conversion Linker / CCM endpoint on the google.com domain. Companion to Enhanced
      Conversions form-data: carries the hashed PII and links it to the Google Click Identifier
      (GCLID) for attribution. Same CPRA sharing analysis applies.
    action: >-
      Same as Enhanced Conversions: audit form-field wiring, suppress on GPC and opt-out, disclose by
      name in privacy policy.

  - pattern: "google.com/ccm/collect"
    name: "Google Ads CCM (Collect)"
    category: "Advertising"
    cc: a
    risk: high
    regs:
      - ECPA
      - US State Privacy
    description: >-
      Google Conversion Measurement endpoint on the google.com domain. Variant of the CCM collection
      endpoint used by Google Ads conversion tracking. Sends page URL, event names, and tracking
      identifiers to Google for conversion attribution and remarketing. Constitutes "sharing" under
      CPRA.
    action: >-
      Suppress on GPC and CCPA opt-out. Confirm the upstream tag that fires this endpoint is
      consent-gated in your tag manager. Disclose Google Ads conversion measurement in your privacy
      policy.

  - pattern: "google.com/rmkt/collect"
    name: "Google Ads Remarketing Collection"
    category: "Advertising"
    cc: a
    risk: high
    regs:
      - ECPA
      - US State Privacy
    description: >-
      Google Ads remarketing collection endpoint. Builds custom audiences for retargeted advertising
      based on site visits and conversion events. Page URLs and event names are transmitted.
      Constitutes "sharing" under CPRA. This is the canonical cross-context behavioral advertising
      data flow.
    action: >-
      Suppress on GPC and CCPA opt-out. Confirm remarketing audiences are not built for opted-out
      users. Disclose in your privacy policy and identify by purpose (remarketing).

  - pattern: "google.com/pagead/1p-user-list"
    name: "Google Ads 1P User List Upload"
    category: "Advertising"
    cc: a
    risk: high
    regs:
      - ECPA
      - US State Privacy
    description: >-
      Google Ads first-party customer list upload endpoint. Used to build Customer Match audiences
      from site visitors. Transmits hashed user identifiers to Google for audience matching.
      Constitutes "sharing" under CPRA and is one of the most frequently litigated data flows.
    action: >-
      Verify the 1P User List tag is consent-gated. Audit the list of fields uploaded to Google.
      Disclose Customer Match by name in your privacy policy. Suppress on GPC and CCPA opt-out.

  - pattern: "pagead/viewthroughconversion"
    name: "Google Ads Viewthrough Conversion"
    category: "Advertising"
    cc: a
    risk: medium
    regs:
      - ECPA
      - US State Privacy
    description: >-
      Google Ads viewthrough conversion pixel. Fires when a user converts after viewing (not clicking)
      a Google ad. Sends conversion event and identifiers to Google for attribution.
    action: >-
      Suppress on GPC and CCPA opt-out. Disclose in privacy policy as part of Google Ads attribution.

  - pattern: "googleadservices.com"
    name: "Google Ads"
    category: "Advertising"
    cc: a
    risk: medium
    regs:
      - ECPA
      - US State Privacy
    description: >-
      Google Ads conversion tracking and Enhanced Conversions infrastructure. If Enhanced Conversions
      is active, hashed PII is transmitted to Google.
    action: >-
      Verify Enhanced Conversions PII handling. Confirm CMP suppression on opt-out.

  - pattern: "clarity.ms"
    name: "Microsoft Clarity"
    category: "Session Replay"
    cc: s
    risk: high
    regs:
      - ECPA
      - CIPA
      - US State Privacy
    description: >-
      <<SR_FRAMING>> Microsoft Clarity specifically: Microsoft operates as an independent data
      controller under its published terms (Section 4.4(c)(iii) reserves the right to "create user
      profiles for purposes that include advertising"), not as a service provider. Microsoft does not
      sign DPAs or service provider addendums with deploying customers. As of October 31, 2025,
      Microsoft began requiring valid consent signals from visitors in the EEA, UK, and Switzerland
      before Clarity collects data, though the underlying controller relationship has not changed for
      US deployments. Default input field masking exists but has documented gaps, including a known
      issue where Copilot Session Insights can surface content that should be masked.
    action: >-
      <<SR_ACTION>> For Microsoft Clarity specifically: implement the Clarity Consent API and gate
      firing to a behavioral-analytics consent category, not page-load default. Note the independent
      controller designation in your privacy policy. Microsoft has been named as a defendant in
      session replay litigation (notably Popa v. Microsoft, though that case was dismissed on Article
      III standing grounds in August 2025).

  - pattern: "hotjar.com"
    name: "Hotjar"
    category: "Session Replay"
    cc: s
    risk: high
    regs:
      - ECPA
      - CIPA
      - US State Privacy
    description: >-
      <<SR_FRAMING>> Hotjar specifically: includes session recording, heatmaps, and surveys. Hotjar
      operates as a processor under standard DPA terms (Contentsquare-owned since 2023).
    action: >-
      <<SR_ACTION>>

  - pattern: "fullstory.com"
    name: "FullStory"
    category: "Session Replay"
    cc: s
    risk: high
    regs:
      - ECPA
      - CIPA
      - US State Privacy
    description: >-
      <<SR_FRAMING>> FullStory specifically: full session capture including DOM snapshots. Operates as
      a processor under standard DPA terms.
    action: >-
      <<SR_ACTION>>

  - pattern: "logrocket.com"
    name: "LogRocket"
    category: "Session Replay"
    cc: s
    risk: high
    regs:
      - ECPA
      - CIPA
      - US State Privacy
    description: >-
      <<SR_FRAMING>> LogRocket specifically: session recording with console log capture. Elevated
      exposure on authenticated and transactional pages because console output may include sensitive
      runtime values.
    action: >-
      <<SR_ACTION>>

  - pattern: "cdn.segment.com"
    name: "Segment (Analytics.js)"
    category: "CDP"
    cc: d
    risk: low
    regs:
      - US State Privacy
    description: >-
      Segment browser SDK detected. Events sent client-side are visible in the HAR. However,
      server-side (cloud-mode) destinations including Meta CAPI, Google Ads, and TikTok Events API are
      not visible here. They fire from your server after the browser call completes. A clean HAR does
      not mean those destinations are not receiving data. Consent enforcement must be verified at the
      data plane level, not just the browser.
    action: >-
      Audit all Segment destinations. Confirm server-side destinations honor opt-out flags passed in
      event context. Verify consent state is propagated to the data plane. Check integrations object
      in event payloads below.

  - pattern: "api.segment.com"
    name: "Segment (Data Plane)"
    category: "CDP"
    cc: d
    risk: medium
    regs:
      - US State Privacy
    description: >-
      Segment data plane API receiving event POSTs from the browser. Payload inspection below shows
      event names, PII field presence, and destination routing configuration.
    action: >-
      Review integrations object for All:true pattern. Verify opt-out context is passed with each
      event. Confirm server-side destinations are not receiving events for opted-out users.

  - pattern: "api.rudderstack.com"
    name: "RudderStack (Data Plane)"
    category: "CDP"
    cc: d
    risk: medium
    regs:
      - US State Privacy
    description: >-
      RudderStack data plane receiving event POSTs. Same server-side gap applies. Destinations
      configured in RudderStack receive events server-side and are not visible in the HAR. Payload
      inspection below shows what was sent from the browser.
    action: >-
      Review destination configuration. Confirm consent enforcement at the transformation layer.
      Verify opted-out users are suppressed at source.

  - pattern: "cdn.rudderlabs.com/v"
    name: "RudderStack (SDK)"
    category: "CDP"
    cc: d
    risk: low
    regs:
      - US State Privacy
    description: >-
      RudderStack browser SDK loaded from a versioned CDN path. Client-side calls visible in HAR.
      Server-side destination forwarding not visible.
    action: >-
      Verify consent controls at source level. Review data plane event payloads in CDP Events tab.

  - pattern: "dataplane.rudderstack.com"
    name: "RudderStack (Data Plane)"
    category: "CDP"
    cc: d
    risk: medium
    regs:
      - US State Privacy
    description: >-
      RudderStack data plane endpoint. Receives event POSTs from the browser. Destinations configured
      server-side receive forwarded events and are not visible in this HAR.
    action: >-
      Review destination configuration. Verify consent enforcement at transformation layer. Confirm
      opted-out users are suppressed at source.

  - pattern: "rudder-analytics.min.js"
    name: "RudderStack (Analytics SDK, legacy)"
    category: "CDP"
    cc: d
    risk: low
    regs:
      - US State Privacy
    description: >-
      RudderStack legacy Analytics SDK file. Confirms RudderStack is the active CDP regardless of
      which domain serves the file.
    action: >-
      Verify SDK loads only after consent for analytics or CDP-routed processing. Review CDP Events
      tab.

  - pattern: "sourceConfig/?p="
    name: "RudderStack (Source Config)"
    category: "CDP"
    cc: d
    risk: medium
    regs:
      - US State Privacy
    description: >-
      RudderStack source configuration call detected. The /sourceConfig/?p=<src> path with a writeKey
      parameter is the definitive RudderStack signature and matches regardless of whether the SDK is
      loaded from RudderStack's CDN (p=cdn) or bundled via npm (p=npm), and regardless of whether the
      data plane runs on a RudderStack-owned domain or a customer-owned CNAME. CNAME deployments are
      first-party from the browser's perspective: they share cookies with the parent domain, bypass
      third-party cookie restrictions, and are typically excluded from CMP block-by-default lists.
      This is intentional infrastructure and not in itself a violation, but it changes the consent
      enforcement model. Server-side destinations configured inside RudderStack receive forwarded
      events and are not visible in this HAR.
    action: >-
      Confirm the CNAME deployment is documented in your privacy policy as a first-party endpoint that
      forwards to third-party destinations. Audit configured destinations in the RudderStack
      workspace. Verify consent context (tracking_consent, marketing_consent,
      consentManagement.deniedConsentIds) is read at the transformation or destination level before
      forwarding, not just emitted in the event payload.

  - pattern: "rsa.min.js"
    name: "RudderStack (Analytics SDK)"
    category: "CDP"
    cc: d
    risk: low
    regs:
      - US State Privacy
    description: >-
      RudderStack Analytics SDK (rsa.min.js, build=modern). Loads the client-side event collection
      library. Confirms RudderStack is the active CDP regardless of which domain serves the file.
    action: >-
      Verify the SDK loads only after consent for analytics or CDP-routed processing. Review the CDP
      Events tab for actual event payloads transmitted.

  - pattern: "rsa-plugins-"
    name: "RudderStack (SDK Plugins)"
    category: "CDP"
    cc: d
    risk: low
    regs:
      - US State Privacy
    description: >-
      RudderStack SDK plugin modules (rsa-plugins-*). The specific plugins loaded reveal which
      features are active: ConsentManager, DeviceModeDestinations, NativeDestinationQueue,
      GoogleLinker, and others each have distinct consent implications.
    action: >-
      Audit the loaded plugin set. CustomConsentManager indicates a custom consent integration; review
      its configuration. DeviceModeDestinations means tags fire client-side and are visible here;
      NativeDestinationQueue means events route server-side and destinations are not visible in this
      HAR.

  - pattern: "doubleclick.net"
    name: "Google DoubleClick / DV360"
    category: "Advertising"
    cc: a
    risk: high
    regs:
      - ECPA
      - US State Privacy
    description: >-
